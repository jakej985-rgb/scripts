nodes:
  control:
    host: localhost
    role: control
  # node1:
  #   host: 192.168.1.11
  #   role: worker

services:
  traefik:
    stack: routing
    enabled: true
    replicas: 1

  radarr:
    stack: media
    enabled: true
    replicas: 1
    autoscale:
      enabled: true
      min: 1
      max: 3
      cpu_threshold: 70
    scheduling:
      strategy: spread

  sonarr:
    stack: media
    enabled: true
    replicas: 1
    autoscale:
      enabled: true
      min: 1
      max: 2
      cpu_threshold: 75
    scheduling:
      strategy: spread

  qbittorrent:
    stack: media
    enabled: true

  prowlarr:
    stack: media
    enabled: true

  tattoo-app:
    stack: apps
    enabled: true
