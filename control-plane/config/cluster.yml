nodes:
  control:
    host: localhost
    role: control
  control-backup:
    host: 192.168.1.13
    role: control

services:
  traefik:
    stack: routing
    enabled: true
    replicas: 1

  # --- Media Stack ---
  radarr:
    stack: media
    enabled: true
    replicas: 1
    port: 7878
    autoscale:
      enabled: true
      min: 1
      max: 3
    scheduling:
      strategy: spread

  sonarr:
    stack: media
    enabled: true
    replicas: 1
    port: 8989
    autoscale:
      enabled: true
      min: 1
      max: 2

  qbittorrent:
    stack: media
    enabled: true
    port: 8080

  prowlarr:
    stack: media
    enabled: true
    port: 9696

  bazarr:
    stack: media
    enabled: true
    port: 6767

  komga:
    stack: media
    enabled: true
    port: 25600

  jellyseerr:
    stack: media
    enabled: true
    port: 5055

  homepage:
    stack: media
    enabled: true
    port: 3000

  autobrr:
    stack: media
    enabled: true
    port: 7474

  recyclarr:
    stack: media
    enabled: true

  maintainerr:
    stack: media
    enabled: true
    port: 6246

  tdarr:
    stack: media
    enabled: true
    port: 8265

  glances:
    stack: media
    enabled: true
    port: 61208

  flaresolverr:
    stack: media
    enabled: true
    port: 8191

  # --- Apps Stack ---
  tattoo-app:
    stack: apps/tattoo-app
    enabled: true
    port: 3001
