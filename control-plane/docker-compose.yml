services:
  # Rex Guard: Pre-flight permission fixer to recover state ownership from root
  permission-fixer:
    image: python:3.11-slim-bookworm
    container_name: m3tal-permission-fixer
    user: "0:0"
    volumes:
      - ${REPO_ROOT}/control-plane/state:/docker/state
      - ${REPO_ROOT}/dashboard:/docker/dashboard
    command: >
      sh -c "chown -R 1000:1000 /docker/state && 
             chmod -R 770 /docker/state &&
             touch /docker/state/acme.json &&
             chmod 600 /docker/state/acme.json &&
             chown -R 1000:1000 /docker/dashboard/users.json &&
             chmod 600 /docker/dashboard/users.json || true"
    networks:
      - proxy

  m3tal-dashboard:
    build:
      context: ..
      dockerfile: control-plane/Dockerfile.dashboard
    container_name: m3tal-dashboard
    depends_on:
      permission-fixer:
        condition: service_completed_successfully
    volumes:
      - ${REPO_ROOT:?REPO_ROOT not set — run from repo root with .env}:/docker
    working_dir: /docker/dashboard
    command: python3 server.py
    restart: unless-stopped
    # Running as non-root appuser (configured in Dockerfile)
    environment:
      - TZ=America/Denver
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:?DASHBOARD_SECRET not set — run from repo root with .env}
      - STATE_DIR=/docker/control-plane/state
      - USERS_FILE=/docker/dashboard/users.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`m3tal.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=control-plane"
    networks:
      - proxy
    env_file:
      - ../.env

  # Security Hardening: Docker Socket Proxy (Audit Fix 5)
  # This prevents the m3tal-runtime from having raw RW access to the host socket.
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: m3tal-docker-proxy
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - POST=1 # Allow restarts/reconciliation
      - NETWORKS=1
      - SERVICES=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:2375/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  m3tal-runtime:
    build:
      context: ..
      dockerfile: control-plane/Dockerfile.runtime
    container_name: m3tal-runtime
    depends_on:
      permission-fixer:
        condition: service_completed_successfully
      docker-proxy:
        condition: service_started
    volumes:
      - ${REPO_ROOT:?REPO_ROOT not set — run from repo root with .env}:/docker
    # 🛡️ SECURITY FIX: No direct socket mount. Talk to proxy instead.
    environment:
      - TZ=America/Denver
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
      - REPO_ROOT=/docker
      - IN_CONTAINER=true
      - DOCKER_HOST=tcp://docker-proxy:2375
    working_dir: /docker
    command: python3 control-plane/agents/run.py
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    networks:
      - proxy

networks:
  proxy:
    external: true
  default:
    name: none
