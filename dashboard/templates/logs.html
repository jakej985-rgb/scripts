<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3TAL | System Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <div class="server-icon">🖥</div>
        <div>
            <div class="server-name">M3TAL Media Server</div>
            <div class="server-sub">AI-Powered Docker Control Plane</div>
        </div>
    </div>
    <nav class="topbar-center">
        <a href="/"            class="nav-link">Dashboard</a>
        <a href="/fleet"       class="nav-link">Fleet</a>
        <a href="/intelligence"class="nav-link">Intelligence</a>
        <a href="/logs"        class="nav-link active">Logs</a>
        <a href="/logout"      class="nav-link danger">Logout</a>
    </nav>
    <div class="topbar-right">
        <div class="status-online"><div class="status-dot"></div>ONLINE</div>
        <div class="live-clock" id="live-clock">00:00:00</div>
    </div>
</header>

<main class="page">
    <div class="page-head">
        <h1>System <span>Logs</span></h1>
        <span class="panel-badge">Auto-refresh 10s</span>
    </div>

    <div class="logs-layout">
        <div class="panel" style="padding:1rem">
            <div class="panel-head" style="margin:-1rem -1rem 0.75rem; border-radius:var(--radius) var(--radius) 0 0">
                <div class="panel-title"><span class="panel-title-dot"></span>Agents</div>
            </div>
            <div id="log-list"><div class="loading-text">Loading…</div></div>
        </div>

        <div class="panel" style="display:flex;flex-direction:column;">
            <div class="panel-head">
                <div class="panel-title" id="log-title"><span class="panel-title-dot"></span>Select a log</div>
                <span class="panel-badge">LIVE</span>
            </div>
            <div class="terminal" id="terminal">Loading…</div>
        </div>
    </div>
</main>

<script>
setInterval(() => {
    const el = document.getElementById('live-clock');
    if (!el) return;
    const n = new Date();
    el.textContent = [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
}, 1000);

let allLogs = {}, currentFile = null;

function colorize(text) {
    return (text || '').split('\n').map(line => {
        if (/\[ERROR\]|FATAL|Exception/i.test(line)) return `<span class="err">${line}</span>`;
        if (/\[WARN/i.test(line))  return `<span class="warn">${line}</span>`;
        if (/\[INFO\]|SUCCESS/i.test(line)) return `<span class="info">${line}</span>`;
        return line;
    }).join('\n');
}

function selectLog(fname) {
    currentFile = fname;
    document.getElementById('log-title').innerHTML = `<span class="panel-title-dot"></span>${fname}`;
    document.querySelectorAll('.log-tab').forEach(t => t.classList.toggle('active', t.dataset.f === fname));
    const term = document.getElementById('terminal');
    const atBottom = term.scrollTop + term.clientHeight >= term.scrollHeight - 20;
    term.innerHTML = colorize(allLogs[fname]);
    if (atBottom) term.scrollTop = term.scrollHeight;
}

async function fetchLogs() {
    try {
        const res = await fetch('/api/logs');
        allLogs = await res.json();
        const files = Object.keys(allLogs).sort();
        const list = document.getElementById('log-list');

        if (files.length === 0) { list.innerHTML = '<div class="loading-text">No logs found.</div>'; return; }

        if (!currentFile || list.querySelector('.loading-text')) {
            list.innerHTML = files.map(f => `<div class="log-tab" data-f="${f}" onclick="selectLog('${f}')">${f.replace('.log','')}</div>`).join('');
        }

        if (!currentFile) {
            const def = files.find(f => f === 'leader.log') || files.find(f => f === 'monitor.log') || files[0];
            selectLog(def);
        } else {
            document.querySelectorAll('.log-tab').forEach(t => t.classList.toggle('active', t.dataset.f === currentFile));
            const term = document.getElementById('terminal');
            const atBottom = term.scrollTop + term.clientHeight >= term.scrollHeight - 20;
            term.innerHTML = colorize(allLogs[currentFile]);
            if (atBottom) term.scrollTop = term.scrollHeight;
        }
    } catch(e) { console.error(e); }
}

fetchLogs();
setInterval(fetchLogs, 10000);
</script>
</body>
</html>
