<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3TAL | System Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <nav class="glass-nav">
        <div class="logo">M3TAL<span>PRO</span></div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/fleet">Fleet</a>
            <a href="/intelligence">Intelligence</a>
            <a href="/logs" class="active">Logs</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="page-header">
            <h1>System <span class="gradient-text">Logs</span></h1>
            <p class="page-subtitle">Real-time log viewer for M3TAL control agents</p>
        </header>

        <div class="logs-layout">
            <aside class="logs-sidebar glass-panel">
                <div class="panel-header">
                    <h2>Agents</h2>
                </div>
                <div id="log-list" class="log-list">
                    <div class="loading-text">Loading agents...</div>
                </div>
            </aside>
            
            <section class="logs-viewer glass-panel">
                <div class="panel-header">
                    <h2 id="current-log-title">Select an agent log</h2>
                    <span class="badge" id="refresh-indicator">Auto-refreshing (10s)</span>
                </div>
                <div class="terminal-window">
                    <pre id="log-content">Loading...</pre>
                </div>
            </section>
        </div>
    </main>

    <style>
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 2rem; }
        .page-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem; }

        .logs-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .logs-layout {
                grid-template-columns: 1fr;
            }
        }

        .logs-sidebar {
            padding: 1.5rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .log-tab {
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .log-tab:hover {
            background: rgba(255,255,255,0.06);
        }

        .log-tab.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: var(--accent-color);
        }

        .logs-viewer {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .terminal-window {
            background: #000;
            border-radius: 8px;
            padding: 1rem;
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        #log-content {
            white-space: pre-wrap;
            color: #d4d4d4;
            margin: 0;
        }

        .log-line-error { color: #ef4444; }
        .log-line-warn { color: #f59e0b; }
        .log-line-info { color: #3b82f6; }
        
        .badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .loading-text { color: var(--text-secondary); text-align: center; padding: 1rem; }
    </style>

    <script>
        let allLogs = {};
        let currentLogFile = null;

        function formatLogContent(content) {
            if (!content) return "No logs available.";
            return content.split('\n').map(line => {
                if (line.includes('[ERROR]') || line.includes('FATAL') || line.includes('Exception')) {
                    return `<span class="log-line-error">${line}</span>`;
                } else if (line.includes('[WARN') || line.includes('DEGRADED')) {
                    return `<span class="log-line-warn">${line}</span>`;
                } else if (line.includes('[INFO]') || line.includes('SUCCESS')) {
                    return `<span class="log-line-info">${line}</span>`;
                }
                return line;
            }).join('\n');
        }

        function renderLogContent() {
            const contentEl = document.getElementById('log-content');
            if (!currentLogFile || !allLogs[currentLogFile]) {
                contentEl.innerHTML = "Select an agent log to view.";
                return;
            }
            
            const wasAtBottom = (contentEl.parentElement.scrollTop + contentEl.parentElement.clientHeight) >= (contentEl.parentElement.scrollHeight - 20);
            
            contentEl.innerHTML = formatLogContent(allLogs[currentLogFile]);
            
            if (wasAtBottom) {
                contentEl.parentElement.scrollTop = contentEl.parentElement.scrollHeight;
            }
        }

        function selectLog(filename) {
            currentLogFile = filename;
            document.getElementById('current-log-title').textContent = filename;
            
            // Update active tab class
            document.querySelectorAll('.log-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filename === filename);
            });
            
            renderLogContent();
            
            // Scroll to bottom when first selected
            const terminal = document.querySelector('.terminal-window');
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                allLogs = await res.json();
                
                const filenames = Object.keys(allLogs).sort();
                const listEl = document.getElementById('log-list');
                
                if (filenames.length === 0) {
                    listEl.innerHTML = '<div class="loading-text">No logs found.</div>';
                    return;
                }
                
                // Only render list if it changed (or first time)
                if (listEl.children.length === 0 || listEl.querySelector('.loading-text') || filenames.length !== listEl.children.length) {
                    listEl.innerHTML = filenames.map(f => 
                        `<div class="log-tab ${f === currentLogFile ? 'active' : ''}" data-filename="${f}" onclick="selectLog('${f}')">${f.replace('.log', '')}</div>`
                    ).join('');
                }
                
                if (!currentLogFile && filenames.length > 0) {
                    // Default select the leader or monitor log if present, else first
                    let defaultLog = filenames.find(f => f === 'leader.log') || filenames.find(f => f === 'monitor.log') || filenames[0];
                    selectLog(defaultLog);
                } else {
                    renderLogContent();
                }
                
            } catch (e) {
                console.error("Failed to fetch logs:", e);
                if (Object.keys(allLogs).length === 0) {
                    document.getElementById('log-list').innerHTML = `<div class="loading-text" style="color:var(--danger)">Error loading logs.</div>`;
                }
            }
        }

        fetchLogs();
        setInterval(fetchLogs, 10000);
    </script>
</body>
</html>
