<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3TAL | Authorize</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">M3TAL</div>
            <h1>Authorize <span style="color:var(--teal)">Access</span></h1>
            <p>AI-Powered Docker Control Plane</p>

            <form action="/login" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="field-group">
                    <input type="text" name="username" placeholder="Identity" autocomplete="username" required>
                </div>
                <div class="field-group">
                    <input type="password" name="password" placeholder="Passphrase" autocomplete="current-password" required>
                </div>

                {% if error %}
                <p class="error-msg">{{ error }}</p>
                {% endif %}

                <button type="submit" class="login-btn">Initialize Connection</button>
            </form>
        </div>
    </div>
</body>
</html>
