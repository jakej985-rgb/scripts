<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3TAL | Autonomous Control Plane</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <nav class="glass-nav">
        <div class="logo">M3TAL<span>PRO</span></div>
        <div class="nav-links">
            <a href="/" class="active">Dashboard</a>
            <a href="/fleet">Fleet</a>
            <a href="/intelligence">Intelligence</a>
            <a href="/logs">Logs</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <!-- Header Section -->
        <header class="hero-section">
            <div class="system-status">
                <h1>Autonomous <span class="gradient-text">Orchestration</span></h1>
                <p id="system-verdict">System Status: <span class="status-pill loading">Computing...</span></p>
            </div>
            <div class="health-card">
                <div class="health-score-ring">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" class="bg"></circle>
                        <circle cx="50" cy="50" r="45" class="meter" id="health-meter"></circle>
                    </svg>
                    <div class="score-text">
                        <span id="health-score">0</span>%
                    </div>
                </div>
                <p>Global Stability Index</p>
            </div>
        </header>

        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <label>CPU Usage</label>
                <div class="val" id="cpu-val">0.0%</div>
                <div class="progress-bar"><div class="fill" id="cpu-fill"></div></div>
            </div>
            <div class="stat-card">
                <label>Memory Usage</label>
                <div class="val" id="mem-val">0.0 GB</div>
                <div class="progress-bar"><div class="fill" id="mem-fill"></div></div>
            </div>
            <div class="stat-card">
                <label>Nodes Active</label>
                <div class="val" id="nodes-val">1</div>
                <div class="small-text">Masters Detected</div>
            </div>
        </section>

        <!-- Main Workspace -->
        <div class="workspace-grid">
            <!-- Container Fleet -->
            <section class="fleet-section glass-panel">
                <div class="panel-header">
                    <h2>Container Fleet</h2>
                    <span class="pulse-icon"></span>
                </div>
                <div id="container-list" class="container-list">
                    <!-- Dynamic Content -->
                </div>
            </section>

            <!-- Anomalies & Events -->
            <section class="events-section glass-panel">
                <div class="panel-header">
                    <h2>Intelligence Feed</h2>
                </div>
                <div id="anomaly-feed" class="anomaly-feed">
                    <!-- Intelligence events -->
                </div>
            </section>
        </div>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
