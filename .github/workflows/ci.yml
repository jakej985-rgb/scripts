name: M3TAL Control Plane CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Verify init.py runs clean
      run: python3 control-plane/init.py --dry-run
    - name: Run full test suite
      run: pytest control-plane/tests/ -v
    - name: Verify backup.py dry-run
      run: python3 scripts/backup.py --dry-run

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Verify init.py runs on Windows
      run: python control-plane/init.py --dry-run
    - name: Run test suite on Windows
      run: pytest control-plane/tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Lint Tools
      run: pip install flake8
    - name: Lint — syntax errors and undefined names
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Lint — style warnings
      run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
