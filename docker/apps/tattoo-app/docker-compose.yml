services:
  api:
    image: node:20
    container_name: tattoo-api
    working_dir: /app
    volumes:
      - /mnt/tattoo/backend:/app
      - /mnt/tattoo/uploads:/app/uploads
    command:
      - sh
      - -c
      - 'npm install && npm start'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tattoo.rule=Host(`tattoo.${DOMAIN}`)"
      - "traefik.http.services.tattoo.loadbalancer.server.port=3000"
    networks:
      - m3tal
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:latest
    container_name: tattoo-db
    environment:
      POSTGRES_USER: tattoo
      POSTGRES_PASSWORD: ${TATTOO_DB_PASSWORD}
      POSTGRES_DB: tattooapp
    volumes:
      - /mnt/tattoo/db:/var/lib/postgresql/data
    restart: unless-stopped

networks:
  m3tal:
    external: true
