services:
  api:
    image: mcr.microsoft.com/dotnet/aspnet:8.0
    container_name: tattoo-api
    working_dir: /app
    volumes:
      - ${REPO_ROOT}/Infernal-Ink-Steel-Suite/InfernalInkSteelSuite.Api/publish:/app
      - ${DATA_DIR}/tattoo/db:/data
      - ${DATA_DIR}/tattoo/uploads:/app/wwwroot/uploads
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/tattoo.db
      - JWT_KEY=${JWT_KEY:?JWT_KEY not set}
    command: ["dotnet", "InfernalInkSteelSuite.Api.dll"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxy
    env_file:
      - ../../../.env
    restart: unless-stopped

  web:
    image: mcr.microsoft.com/dotnet/aspnet:8.0
    container_name: tattoo-web
    working_dir: /app
    volumes:
      - ${REPO_ROOT}/Infernal-Ink-Steel-Suite/InfernalInkSteelSuite.Web/publish:/app
    environment:
      - ASPNETCORE_URLS=http://+:3000
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://tattoo-api:5000
    command: ["dotnet", "InfernalInkSteelSuite.Web.dll"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tattoo.rule=Host(`tattoo.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.tattoo.entrypoints=web"
      - "traefik.http.services.tattoo.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=tattoo-app"
    networks:
      - proxy
    env_file:
      - ../../../.env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

networks:
  proxy:
    external: true
