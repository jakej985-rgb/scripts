services:
  api:
    image: node:20
    container_name: tattoo-api
    working_dir: /app
    volumes:
      - ${DATA_DIR}/tattoo/backend:/app
      - ${DATA_DIR}/tattoo/uploads:/app/uploads
    command:
      - sh
      - -c
      - 'npm install && npm start'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tattoo.rule=Host(`tattoo.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.tattoo.entrypoints=web"
      - "traefik.http.services.tattoo.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=tattoo-app"
    networks:
      - proxy
      - app_internal
    env_file:
      - ../../../.env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:latest
    container_name: tattoo-db
    environment:
      POSTGRES_USER: tattoo
      POSTGRES_PASSWORD: ${TATTOO_DB_PASSWORD:?TATTOO_DB_PASSWORD not set}
      POSTGRES_DB: tattooapp
    volumes:
      - ${DATA_DIR}/tattoo/db:/var/lib/postgresql/data
    networks:
      - app_internal
    env_file:
      - ../../../.env
    restart: unless-stopped

networks:
  proxy:
    external: true
  app_internal:
    driver: bridge
  default:
    name: none
