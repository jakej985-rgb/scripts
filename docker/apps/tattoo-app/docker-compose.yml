services:
  api:
    image: mcr.microsoft.com/dotnet/aspnet:8.0
    container_name: tattoo-api
    working_dir: /app
    volumes:
      - ${REPO_ROOT}/Infernal-Ink-Steel-Suite/InfernalInkSteelSuite.Api/publish:/app
      - ${DATA_DIR}/tattoo/db:/data
      - ${DATA_DIR}/tattoo/uploads:/app/wwwroot/uploads
    environment:
      - ASPNETCORE_URLS=http://+:3000
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/tattoo.db
    command: ["dotnet", "InfernalInkSteelSuite.Api.dll"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tattoo.rule=Host(`tattoo.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.tattoo.entrypoints=web"
      - "traefik.http.services.tattoo.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=tattoo-app"
    networks:
      - proxy
    env_file:
      - ../../../.env
    restart: unless-stopped

  db:
    image: postgres:latest
    container_name: tattoo-db
    environment:
      POSTGRES_USER: tattoo
      POSTGRES_PASSWORD: ${TATTOO_DB_PASSWORD:?TATTOO_DB_PASSWORD not set}
      POSTGRES_DB: tattooapp
    volumes:
      - ${DATA_DIR}/tattoo/postgres:/var/lib/postgresql
    networks:
      - proxy
    env_file:
      - ../../../.env
    restart: unless-stopped

networks:
  proxy:
    external: true
