services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=***REDACTED***
      - OPENVPN_PASSWORD=***REDACTED***
      - SERVER_REGIONS=US East
      - FIREWALL_VPN_INPUT_PORTS=8080,6881
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.local`)"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
    networks:
      - m3tal
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
    volumes:
      - /docker/configs/qbittorrent:/config
      - /mnt:/data
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.local`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    networks:
      - m3tal
    volumes:
      - /docker/configs/radarr:/config
      - /mnt:/data
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.local`)"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    networks:
      - m3tal
    volumes:
      - /docker/configs/sonarr:/config
      - /mnt:/data

    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr
    ports:
      - 6767:6767
    volumes:
      - /docker/configs/bazarr:/config
      - /mnt:/data
    restart: unless-stopped

  komga:
    image: gotson/komga
    container_name: komga
    ports:
      - 25600:25600
    volumes:
      - /docker/configs/komga:/config
      - /mnt:/data
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    ports:
      - 5055:5055
    volumes:
      - /docker/configs/jellyseerr:/app/config
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - /docker/configs/homepage:/app/config
      - /mnt/disk1:/disk1
      - /mnt/downloads:/downloads
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
    restart: unless-stopped

  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    ports:
      - 7474:7474
    volumes:
      - /docker/configs/autobrr:/config
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    volumes:
      - /docker/configs/recyclarr:/config
    restart: unless-stopped

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    ports:
      - 6246:6246
    volumes:
      - /docker/configs/maintainerr:/opt/data
    restart: unless-stopped

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    ports:
      - 8265:8265
      - 8266:8266
    volumes:
      - /docker/configs/tdarr:/app/config
      - /docker/configs/tdarr:/app/logs
      - /mnt/disk1:/data
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    ports:
      - 61208:61208
    pid: host
    command: glances -w
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - HOMEPAGE_ALLOWED_HOST=*
      - NODE_TLS_REJECT_UNAUTHORIZED:0
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - /docker/configs/prowlarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.local`)"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    networks:
      - m3tal
    restart: unless-stopped

  flaresolverr:
      image: ghcr.io/flaresolverr/flaresolverr
      container_name: flaresolverr
      environment:
        - LOG_LEVEL:info
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.flaresolverr.rule=Host(`flaresolverr.local`)"
        - "traefik.http.services.flaresolverr.loadbalancer.server.port=8191"
      networks:
        - m3tal
      restart: unless-stopped

networks:
  m3tal:
    external: true



















