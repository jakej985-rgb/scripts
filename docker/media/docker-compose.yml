x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "container:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/qbittorrent:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=media"
      - "m3tal.role=vpn"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/radarr:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/sonarr:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media

    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/bazarr:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.bazarr.entrypoints=web"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  komga:
    image: gotson/komga
    container_name: komga
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:25600/actuator/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/komga:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komga.rule=Host(`komga.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.komga.entrypoints=web"
      - "traefik.http.services.komga.loadbalancer.server.port=25600"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr
    container_name: jellyseerr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/jellyseerr:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=web"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/homepage:/app/config
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.homepage.entrypoints=web"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.39
    container_name: autobrr
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/autobrr:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.autobrr.rule=Host(`autobrr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.autobrr.entrypoints=web"
      - "traefik.http.services.autobrr.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/recyclarr:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    labels:
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    restart: unless-stopped

