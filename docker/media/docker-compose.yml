#      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/maintainerr:/opt/data
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.maintainerr.rule=Host(`maintainerr.${DOMAIN:?DOMAIN not set}`)"
