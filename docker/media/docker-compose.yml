x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASSWORD}
      - SERVER_REGIONS=US East
      - FIREWALL_VPN_INPUT_PORTS=8080,6881
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.local`)"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
    networks:
      - m3tal
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/qbittorrent:/config
      - ${DATA_DIR:-/mnt}:/data
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.local`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.http.services.radarr.loadbalancer.healthcheck.path=/api/v3/system/status"
      - "traefik.http.services.radarr.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.radarr.loadbalancer.sticky.cookie=true"
    networks:
      - m3tal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/radarr:/config
      - ${DATA_DIR:-/mnt}:/data
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.local`)"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.http.services.sonarr.loadbalancer.healthcheck.path=/api/v3/system/status"
      - "traefik.http.services.sonarr.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.sonarr.loadbalancer.sticky.cookie=true"
    networks:
      - m3tal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/sonarr:/config
      - ${DATA_DIR:-/mnt}:/data

    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/bazarr:/config
      - ${DATA_DIR:-/mnt}:/data
    restart: unless-stopped

  komga:
    image: gotson/komga
    container_name: komga
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:25600/actuator/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/komga:/config
      - ${DATA_DIR:-/mnt}:/data
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr
    container_name: jellyseerr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/jellyseerr:/app/config
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/homepage:/app/config
      - ${DATA_DIR:-/mnt}/disk1:/disk1
      - ${DATA_DIR:-/mnt}/downloads:/downloads
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
    restart: unless-stopped

  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.39
    container_name: autobrr
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/autobrr:/config
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/recyclarr:/config
    restart: unless-stopped

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/maintainerr:/opt/data
    restart: unless-stopped

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/tdarr:/app/config
      - ${CONFIG_DIR:-/docker/configs}/tdarr:/app/logs
      - ${DATA_DIR:-/mnt}/disk1:/data
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest
    container_name: glances
    pid: host
    command: glances -w
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - HOMEPAGE_ALLOWED_HOST=*
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:-/docker/configs}/prowlarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.local`)"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    networks:
      - m3tal
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flaresolverr.rule=Host(`flaresolverr.local`)"
      - "traefik.http.services.flaresolverr.loadbalancer.server.port=8191"
    networks:
      - m3tal
    restart: unless-stopped

networks:
  m3tal:
    external: true

















