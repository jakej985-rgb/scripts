  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/tdarr:/app/config
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/tdarr:/app/logs
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tdarr.rule=Host(`tdarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.tdarr.entrypoints=web"
      - "traefik.http.services.tdarr.loadbalancer.server.port=8265"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest
    container_name: glances
    pid: host
    command: glances -w
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glances.rule=Host(`stats.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.glances.entrypoints=web"
      - "traefik.http.services.glances.loadbalancer.server.port=61208"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=edge"
    networks:
      - proxy
    env_file:
      - ../../.env
    environment:
      - HOMEPAGE_ALLOWED_HOST=*
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/prowlarr:/config
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}:/mnt
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set — run from repo root with .env}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flaresolverr.rule=Host(`flaresolverr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.flaresolverr.entrypoints=web"
      - "traefik.http.services.flaresolverr.loadbalancer.server.port=8191"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

########### Same Network Different IP ##########
  jellyfin-remote:
    image: alpine
    container_name: jellyfin-remote
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.m3tal-media-server.xyz`)"
      - "traefik.http.routers.jellyfin.entrypoints=web"
      # 🔥 IMPORTANT: use web for now (matches your other services)
      # remove TLS until everything works

      - "traefik.http.routers.jellyfin.service=jellyfin"

networks:
  proxy:
    external: true
  default:
    name: none
