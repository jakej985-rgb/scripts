x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "container:gluetun"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=media"
      - "m3tal.role=vpn"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.radarr.entrypoints=web"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - radarr_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.sonarr.entrypoints=web"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - sonarr_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - bazarr_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.bazarr.entrypoints=web"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  komga:
    image: gotson/komga
    container_name: komga
    user: "${PUID:-1000}:${PGID:-1000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:25600/actuator/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - komga_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komga.rule=Host(`komga.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.komga.entrypoints=web"
      - "traefik.http.services.komga.loadbalancer.server.port=25600"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr
    container_name: jellyseerr
    user: "${PUID:-1000}:${PGID:-1000}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5055"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - jellyseerr_config:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=web"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - homepage_config:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.homepage.entrypoints=web"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.39
    container_name: autobrr
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - autobrr_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.autobrr.rule=Host(`autobrr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.autobrr.entrypoints=web"
      - "traefik.http.services.autobrr.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - recyclarr_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    labels:
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - tdarr_config:/app/config
      - tdarr_logs:/app/logs
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tdarr.rule=Host(`tdarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.tdarr.entrypoints=web"
      - "traefik.http.services.tdarr.loadbalancer.server.port=8265"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest
    container_name: glances
    # pid: host (Audit Fix C2)
    command: glances -w
    # volumes:
    #   - "/var/run/docker.sock:/var/run/docker.sock:ro" (Audit Fix C2)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glances.rule=Host(`stats.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.glances.entrypoints=web"
      - "traefik.http.services.glances.loadbalancer.server.port=61208"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=edge"
    networks:
      - proxy
    env_file:
      - ../../.env
    environment:
      - HOMEPAGE_ALLOWED_HOST=stats.${DOMAIN}
      - DOCKER_HOST=tcp://m3tal-docker-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=America/Denver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - prowlarr_config:/config
      - ${DATA_DIR:?DATA_DIR not set}:/mnt
      - ${DATA_DIR:?DATA_DIR not set}/downloads:/downloads
      - ${DATA_DIR:?DATA_DIR not set}/media:/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.prowlarr.entrypoints=web"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr
    container_name: flaresolverr
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - LOG_LEVEL=info
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flaresolverr.rule=Host(`flaresolverr.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.flaresolverr.entrypoints=web"
      - "traefik.http.services.flaresolverr.loadbalancer.server.port=8191"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ../../.env
    restart: unless-stopped

networks:
  proxy:
    external: true
  default:
    name: none

volumes:
  qbittorrent_config:
  radarr_config:
  sonarr_config:
  bazarr_config:
  komga_config:
  jellyseerr_config:
  homepage_config:
  autobrr_config:
  recyclarr_config:
  tdarr_config:
  tdarr_logs:
  prowlarr_config:
