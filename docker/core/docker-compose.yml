services:
  m3tal-dashboard:
    image: python:3.11-slim
    container_name: m3tal-dashboard
    volumes:
      - ./dashboard:/app
      - ./state:/docker/state
      - ./config:/docker/config
      - ./logs:/docker/logs
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "pip install --quiet flask flask-socketio requests bcrypt && python server.py"
    restart: unless-stopped
    environment:
      - TZ=America/Denver
      - STATE_DIR=/docker/state
      - USERS_FILE=/docker/dashboard/users.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`m3tal.local`)"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    networks:
      - m3tal

  m3tal-agents:
    image: docker:24-cli
    container_name: m3tal-agents
    volumes:
      - ./:/docker
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /docker
    command: >
      sh -c "apk add --no-cache jq curl python3 py3-pip bash && pip install --quiet bcrypt requests PyYAML && bash control-plane/run.sh"
    restart: unless-stopped
    environment:
      - TZ=America/Denver
    networks:
      - m3tal

networks:
  m3tal:
    external: true
