services:
  m3tal-dashboard:
    image: python:3.11-slim
    container_name: m3tal-dashboard
    volumes:
      - ${REPO_ROOT:-./../..}/dashboard:/app
      - ${REPO_ROOT:-./../..}/control-plane/state:/docker/state
      - ${REPO_ROOT:-./../..}/control-plane/config:/docker/config
      - ${REPO_ROOT:-./../..}/control-plane/state/logs:/docker/logs
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "pip install --quiet -r /app/../requirements.txt && python server.py"
    restart: unless-stopped
    environment:
      - TZ=America/Denver
      - STATE_DIR=/docker/state
      - USERS_FILE=/app/users.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`m3tal.local`)"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    networks:
      - m3tal

  m3tal-agents:
    image: docker:24-cli
    container_name: m3tal-agents
    volumes:
      - ${REPO_ROOT:-./../..}:/docker
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /docker
    command: >
      sh -c "apk add --no-cache python3 py3-pip bash &&
             pip install --quiet --break-system-packages bcrypt requests PyYAML &&
             python3 control-plane/supervisor.py"
    restart: unless-stopped
    environment:
      - TZ=America/Denver
    networks:
      - m3tal

networks:
  m3tal:
    external: true
