services:
  m3tal-dashboard:
    image: python:3.11-slim
    container_name: m3tal-dashboard
    volumes:
      - ${REPO_ROOT}/dashboard:/app
      - ${REPO_ROOT}/control-plane/state:/docker/state
      - ${REPO_ROOT}/control-plane/config:/docker/config
      - ${REPO_ROOT}/control-plane/state/logs:/docker/logs
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "pip install --quiet -r /app/../requirements.txt && python server.py"
    restart: unless-stopped
    environment:
      - TZ=America/Denver
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - STATE_DIR=/docker/state
      - USERS_FILE=/app/users.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`m3tal.m3tal-media-server.xyz`)"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    networks:
      - m3tal


  m3tal-runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    container_name: m3tal-runtime
    volumes:
      - ${REPO_ROOT}:/docker
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /docker
    command: python3 control-plane/agents/run.py
    restart: unless-stopped
    environment:
      - TZ=America/Denver
      - CF_TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
      - DOMAIN=${DOMAIN}
      - REPO_ROOT=/docker
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - IN_CONTAINER=true
    networks:
      - m3tal

networks:
  m3tal:
    external: true
