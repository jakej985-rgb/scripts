services:
  m3tal-dashboard:
    build:
      context: ../..
      dockerfile: docker/core/Dockerfile.dashboard
    container_name: m3tal-dashboard
    volumes:
      - ${REPO_ROOT}:/docker
    working_dir: /docker/dashboard
    command: python3 server.py
    restart: unless-stopped
    # Running as non-root appuser
    user: "1000:1000"
    environment:
      - TZ=America/Denver
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - STATE_DIR=/docker/control-plane/state
      - USERS_FILE=/docker/dashboard/users.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`m3tal.m3tal-media-server.xyz`)"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    networks:
      - m3tal

  m3tal-runtime:
    build:
      context: ../..
      dockerfile: docker/core/Dockerfile.runtime
    container_name: m3tal-runtime
    volumes:
      - ${REPO_ROOT}:/docker
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /docker
    command: python3 control-plane/agents/run.py
    restart: unless-stopped
    # Running as non-root appuser
    user: "1000:1000"
    environment:
      - TZ=America/Denver
      - CF_TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
      - DOMAIN=${DOMAIN}
      - REPO_ROOT=/docker
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - IN_CONTAINER=true
    networks:
      - m3tal

networks:
  m3tal:
    external: true
