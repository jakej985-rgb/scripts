
services:

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--label-enable"
      - "--cleanup"
      - "--interval"
      - "600"
    environment:
      - TZ=America/Denver
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
    networks:
      - proxy
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=maintenance"

  dozzle:
    image: amir20/dozzle
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.dozzle.entrypoints=web"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=maintenance"
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
    networks:
      - proxy
    env_file:
      - ../../.env

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/portainer:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=maintenance"
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
    networks:
      - proxy
    env_file:
      - ../../.env

  dashboard:
    image: python:3.11-slim
    container_name: m3tal-dashboard-maintenance
    restart: unless-stopped
    volumes:
      - ${REPO_ROOT:?REPO_ROOT not set — run from repo root with .env}:/docker
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /docker/dashboard
    command: >
      sh -c "pip install --quiet -r /docker/requirements.txt && python server.py"
    environment:
      - TZ=America/Denver
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - STATE_DIR=/docker/control-plane/state
      - USERS_FILE=/docker/dashboard/users.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-maint.rule=Host(`m3tal-maint.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.dashboard-maint.entrypoints=web"
      - "traefik.http.services.dashboard-maint.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=maintenance"
    networks:
      - proxy
    env_file:
      - ../../.env

networks:
  proxy:
    external: true
  default:
    name: none
