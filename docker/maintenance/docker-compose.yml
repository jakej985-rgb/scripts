services:

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--label-enable"
      - "--cleanup"
      - "--interval"
      - "600"
    environment:
      - TZ=America/Denver

  dozzle:
    image: amir20/dozzle
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_DIR:-/docker/configs}/portainer:/data

  dashboard:
    image: python:3.11-slim
    container_name: m3tal-dashboard-maintenance
    restart: unless-stopped
    volumes:
      - ${REPO_ROOT:-/docker}:/docker
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /docker/dashboard
    command: >
      sh -c "pip install --quiet -r /docker/requirements.txt && python server.py"
    ports:
      - "8888:8080"
    environment:
      - TZ=America/Denver
