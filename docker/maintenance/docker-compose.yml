
services:

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    # Security: No raw socket. Talk to proxy.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--label-enable"
      - "--cleanup"
      - "--interval"
      - "600"
    environment:
      - TZ=America/Denver
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
      - DOCKER_HOST=tcp://docker-proxy:2375
    networks:
      - proxy
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=maintenance"

  dozzle:
    image: amir20/dozzle
    container_name: dozzle
    restart: unless-stopped
    # Security: No raw socket. Talk to proxy.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.dozzle.entrypoints=web"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=maintenance"
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
    networks:
      - proxy
    env_file:
      - ../../.env

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: unless-stopped
    # Security: No raw socket. Talk to proxy.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
      - ${CONFIG_DIR:?CONFIG_DIR not set — run from repo root with .env}/portainer:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=maintenance"
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
    networks:
      - proxy
    env_file:
      - ../../.env



networks:
  proxy:
    external: true
  default:
    name: none
