
services:

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--label-enable"
      - "--cleanup"
      - "--interval"
      - "600"
    environment:
      - TZ=America/Denver
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
    networks:
      - m3tal

  dozzle:
    image: amir20/dozzle
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.m3tal-media-server.xyz`)"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
    networks:
      - m3tal

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_DIR}/portainer:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.m3tal-media-server.xyz`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
    networks:
      - m3tal

  dashboard:
    image: python:3.11-slim
    container_name: m3tal-dashboard-maintenance
    restart: unless-stopped
    volumes:
      - ${REPO_ROOT}:/docker
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /docker/dashboard
    command: >
      sh -c "pip install --quiet -r /docker/requirements.txt && python server.py"
    environment:
      - TZ=America/Denver
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - STATE_DIR=/docker/control-plane/state
      - USERS_FILE=/docker/dashboard/users.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-maint.rule=Host(`m3tal-maint.m3tal-media-server.xyz`)"
      - "traefik.http.services.dashboard-maint.loadbalancer.server.port=8080"
    networks:
      - m3tal

networks:
  m3tal:
    external: true
