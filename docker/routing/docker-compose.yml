
services:
  traefik:
    image: traefik:latest
    container_name: traefik
    # Fix: chmod acme.json to 600 before Traefik reads it (permission-fixer
    # runs in the control-plane stack, which may not have executed yet).
    entrypoint:
      - sh
      - -c
      - |
        chmod 600 /etc/traefik/acme.json 2>/dev/null || true
        exec traefik "$$@"
      - --
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://m3tal-docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@${DOMAIN}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    environment:
      # Traefik v3.6+ negotiates automatically, but we pin the version
      # as a safety net to prevent API version mismatch with newer Docker engines.
      - DOCKER_API_VERSION=1.45
      - DOMAIN=${DOMAIN}
    env_file:
      - ../../.env
    user: "1000:1000"
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../../control-plane/state/traefik-dynamic-dir:/etc/traefik/dynamic:ro
      - ../../control-plane/state/acme.json:/etc/traefik/acme.json
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:?DOMAIN not set — run from repo root with .env}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.middlewares=m3tal-auth"
      - "traefik.http.middlewares.m3tal-auth.basicauth.usersfile=/etc/traefik/dynamic/users"
      - "m3tal.stack=routing"
      - "m3tal.role=gateway"

    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN not set — run from repo root with .env}
    networks:
      - proxy
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=routing"
      - "m3tal.role=edge"
    restart: unless-stopped

networks:
  proxy:
    external: true
  default:
    name: none
